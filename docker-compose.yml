version: '3.8'

services:
  app:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  train:
    build: .
    volumes:
      - .:/app
    command: python train.py --timesteps ${TOTAL_TIMESTEPS} --reward_type ${REWARD_TYPE}

  train-baseline:
    build: .
    volumes:
      - .:/app
    command: python train.py --timesteps ${TOTAL_TIMESTEPS} --reward_type baseline

  evaluate:
    build: .
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/app
    command: python evaluate.py --model_path ${MODEL_PATH}

  evaluate-gif:
    build: .
    volumes:
      - .:/app
    # Use Xvfb for GIF generation so it doesn't need a real display
    command: sh -c "Xvfb :99 -screen 0 800x600x24 & DISPLAY=:99 python evaluate.py --model_path ${MODEL_PATH} --episodes 1 --gif_name agent_final.gif"
